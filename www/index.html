<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PhoneCompare</title>
        <link rel="stylesheet" href="style.css" type="text/css">
        <link rel="icon" type="image/x-icon" href="images/favicon.png">
    </head>
    <body>
        <header>
            <h1>PHONE COMPARE</h1>
        </header>
        <main>
            <div class="section-container">
                <div class="section">
                    <h2>CONTRACT</h2>
                    <div class="input-section">
                        <label for="upfront">Up Front:</label><br>
                        <input type="number" id="upfront" value="0">
                    </div>

                    <div class="input-section">
                        <label for="monthly">Monthly Price: </label><br>
                        <input type="number" id="monthly" value="0">
                    </div>
                    
                    <div class="input-section">
                        <label for="monthly1">First Increase</label><br>
                        <input type="number" id="monthly1" value="0">
                    </div>

                    <div class="input-section">
                        <label for="monthly2">Second Increase</label><br>
                        <input type="number" id="monthly2" value="0">
                    </div>

                    <h3 id="result1" class="result"></h3>
                </div>
                <div class="divider"></div>
                <div class="section">
                    <h2>OUTRIGHT (+ SIM)</h2>
                    <div class="input-section">
                        <label for="cashPrice">Cash Price:</label><br>
                        <input type="number" id="cashPrice" value="0">
                    </div>

                    <div class="input-section">
                        <label for="simOnly">Sim Only (optional):</label><br>
                        <input type="number" id="simOnly" value="0">
                    </div>

                    <h3 id="result2" class="result"></h3>
                </div>
            </div>
            <div class="final">
                <button onclick="Submit()">SUBMIT</button>
                <button onclick="Clear()">CLEAR</button>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
